<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>License Manager - 购买页面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: #f5f5f5;
            color: #333;
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .header {
            background: #3b82f6;
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-radius: 0 0 20px 20px;
            margin-bottom: 30px;
        }
        
        .pricing {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .plan-card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .plan-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }
        
        .plan-card h3 {
            color: #333;
            margin-bottom: 10px;
        }
        
        .plan-card .price {
            font-size: 36px;
            font-weight: bold;
            color: #667eea;
            margin: 15px 0;
        }
        
        .plan-card .price span {
            font-size: 14px;
            color: #999;
            font-weight: normal;
        }
        
        .plan-card .features {
            list-style: none;
            padding: 0;
            margin: 20px 0;
        }
        
        .plan-card .features li {
            padding: 8px 0;
            color: #666;
            border-bottom: 1px solid #eee;
        }
        
        .plan-card .features li:last-child {
            border-bottom: none;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #3b82f6;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal.active {
            display: flex;
        }
        
        .modal-content {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 90%;
            max-width: 500px;
        }
        
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #555;
            font-weight: 600;
        }
        
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }
        
        .result {
            margin-top: 15px;
            padding: 15px;
            border-radius: 8px;
            display: none;
        }
        
        .result.success {
            background: #d4edda;
            color: #155724;
        }
        
        .result.error {
            background: #f8d7da;
            color: #721c24;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🔐 License Manager</h1>
        <p>选择适合您的许可证套餐</p>
    </div>
    
    <div class="container">
        <div class="pricing">
            <div class="plan-card">
                <h3>📅 月度版</h3>
                <div class="price">¥29<span>/月</span></div>
                <ul class="features">
                    <li>5台设备同时使用</li>
                    <li>完整功能访问</li>
                    <li>技术支持</li>
                    <li>30天有效期</li>
                </ul>
                <button class="btn" onclick="showPurchaseModal('monthly')">购买</button>
            </div>
            
            <div class="plan-card">
                <h3>📆 年度版</h3>
                <div class="price">¥299<span>/年</span></div>
                <ul class="features">
                    <li>5台设备同时使用</li>
                    <li>完整功能访问</li>
                    <li>优先技术支持</li>
                    <li>365天有效期</li>
                    <li>节省约17%</li>
                </ul>
                <button class="btn" onclick="showPurchaseModal('yearly')">购买</button>
            </div>
            
            <div class="plan-card">
                <h3>♾️ 终身版</h3>
                <div class="price">¥999<span>/终身</span></div>
                <ul class="features">
                    <li>5台设备同时使用</li>
                    <li>完整功能访问</li>
                    <li>专属技术支持</li>
                    <li>永久使用</li>
                    <li>免费升级</li>
                </ul>
                <button class="btn" onclick="showPurchaseModal('lifetime')">购买</button>
            </div>
        </div>
    </div>
    
    <!-- 购买模态框 -->
    <div class="modal" id="purchase-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>购买许可证</h3>
                <button class="close" onclick="hidePurchaseModal()">&times;</button>
            </div>
            <form id="purchase-form">
                <div class="form-group">
                    <label>套餐类型</label>
                    <select id="plan-type" required>
                        <option value="monthly">月度版（30天）</option>
                        <option value="yearly">年度版（365天）</option>
                        <option value="lifetime">终身版</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>邮箱地址</label>
                    <input type="email" id="purchase-email" placeholder="请输入您的邮箱" required>
                </div>
                <button type="submit" class="btn">购买并获取激活码</button>
            </form>
            <div id="purchase-result" class="result"></div>
        </div>
    </div>
    
    <script>
        const API_URL = 'http://localhost:5000';
        
        // 获取URL参数
        function getUrlParam(name) {
            const urlParams = new URLSearchParams(window.location.search);
            return urlParams.get(name);
        }
        
        // 设置套餐类型
        window.addEventListener('load', () => {
            const plan = getUrlParam('plan') || 'monthly';
            document.getElementById('plan-type').value = plan;
        });
        
        let currentPlan = 'monthly';
        
        function showPurchaseModal(plan) {
            currentPlan = plan;
            document.getElementById('plan-type').value = plan;
            document.getElementById('purchase-modal').classList.add('active');
        }
        
        function hidePurchaseModal() {
            document.getElementById('purchase-modal').classList.remove('active');
        }
        
        document.getElementById('purchase-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const plan = document.getElementById('plan-type').value;
            const email = document.getElementById('purchase-email').value.trim();
            
            if (!email) {
                alert('请输入邮箱地址');
                return;
            }
            
            // 调用支付API
            const resultDiv = document.getElementById('purchase-result');
            resultDiv.innerHTML = '<div class="loading">处理中...</div>';
            resultDiv.style.display = 'block';
            
            try {
                const response = await fetch(`${API_URL}/api/payment/create`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        plan: plan,
                        email: email
                    })
                });
                
                const result = await response.json();
                
                if (result.success) {
                    if (result.payment_mode === 'zpay' && result.pay_url) {
                        // ZPAY真实支付，跳转到支付页面
                        window.location.href = result.pay_url;
                    } else if (result.payment_mode === 'mock') {
                        // 模拟支付，直接生成激活码
                        const activationCode = generateActivationCode();
                        const licenseId = generateLicenseId();
                        const orderId = result.order_id;
                        
                        // 跳转到订单完成页面，传递参数
                        window.location.href = `complete_order.html?activation_code=${activationCode}&email=${email}&plan=${plan}&license_id=${licenseId}&order_id=${orderId}`;
                    } else {
                        alert('支付模式错误');
                    }
                } else {
                    alert(result.message || '创建支付订单失败');
                    resultDiv.innerHTML = '';
                }
            } catch (error) {
                console.error('创建支付订单失败:', error);
                alert('创建支付订单失败');
                resultDiv.innerHTML = '';
            }
        });
        
        function generateActivationCode() {
            // 模拟生成激活码
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 15; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
                if (i === 4 || i === 9) code += '-';
            }
            return code;
        }
    </script>
</body>
</html>
